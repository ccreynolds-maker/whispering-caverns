/**
 * SECTION 2: THE CORE ENGINE
 */
class GameEngine {
    constructor() {
        this.state = this.getInitialState();
        this.terminal = document.getElementById('terminal');
        this.inputMode = 'command'; 
    }

    getInitialState() {
        return {
            player: {
                name: "Hero", hp: 50, mp: 20, baseMaxHp: 50, baseMaxMp: 20,
                attack: 5, defense: 2, xp: 0, level: 1, gold: 0,
                inventory: [], equipment: {}, location: 'field',
                knownSpells: [], reputation: { dwarves: 0 }, companions: []
            },
            world: {}
        };
    }

    print(text, cls = '') {
        const line = document.createElement('div');
        line.className = `output-line ${cls}`;
        line.innerHTML = text;
        this.terminal.appendChild(line);
        this.terminal.scrollTop = this.terminal.scrollHeight;
    }

    getStats() {
        const p = this.state.player;
        let s = { atk: p.attack || 0, def: p.defense || 0, mHp: p.baseMaxHp || 50, mMp: p.baseMaxMp || 20 };
        Object.values(p.equipment || {}).forEach(name => {
            const i = GameData.items[name];
            if (i) {
                s.atk += (i.attack || 0);
                s.def += (i.defense || 0);
                s.mHp += (i.maxHp || 0);
                s.mMp += (i.maxMp || 0);
            }
        });
        return s;
    }

    execute(input) {
        if (this.inputMode === 'load') return this.load(input);
        
        const raw = input.toLowerCase().trim();
        const parts = raw.split(' ');
        const cmd = parts[0];
        const arg = parts.slice(1).join(' ');

        this.print(`> ${input}`, 'user-command');

        if (this.commands[cmd]) this.commands[cmd](arg);
        else if (['n', 's', 'e', 'w', 'u', 'd', 'in', 'out'].includes(cmd)) this.move(cmd);
        else this.print("Unknown command.");
    }

    move(dir) {
        const room = GameData.rooms[this.state.player.location];
        const target = room?.exits[dir];
        if (target) {
            this.state.player.location = target;
            this.commands.look();
        } else this.print("Can't go that way.");
    }

    load(code) {
        try {
            const data = JSON.parse(atob(code));
            this.state.player = data.p || data.player;
            this.state.world = data.w || data.worldState || {};
            // Cleanup legacy inventory nulls
            if (this.state.player.inventory) {
                this.state.player.inventory = this.state.player.inventory.filter(i => i !== null);
            }
            this.print("RESTORING SESSION...", 'save-text');
            this.print(`WELCOME BACK, ${this.state.player.name.toUpperCase()}`, 'location-title');
            this.inputMode = 'command';
            this.commands.look();
        } catch(e) {
            this.print("LOAD FAILED: Code invalid.", 'combat-text');
            this.inputMode = 'command';
        }
    }

    commands = {
        help: () => this.print("n, s, e, w, look, take, inv, stats, attack, magic, save, load"),
        look: () => {
            const p = this.state.player;
            const r = GameData.rooms[p.location] || { name: "Limbo", desc: "You are drifting." };
            this.print(r.name, 'location-title');
            this.print(r.desc);
            if (r.items?.length) this.print("Items: " + r.items.join(', '), 'item-text');
            if (r.enemy) this.print(`Enemy: ${r.enemy}`, 'combat-text');
            if (r.dog) this.print(`A ${GameData.dogs[r.dog].name} is here.`, 'dog-text');
        },
        stats: () => {
            const p = this.state.player;
            const s = this.getStats();
            this.print(`--- ${p.name} ---`, 'location-title');
            this.print(`Lvl: ${p.level} | XP: ${p.xp} | Gold: ${p.gold}`, 'xp-text');
            this.print(`HP: ${p.hp}/${s.mHp} | MP: ${p.mp}/${s.mMp}`);
            this.print(`Atk: ${s.atk} | Def: ${s.def}`, 'combat-text');
        },
        inv: () => {
            const p = this.state.player;
            this.print("--- Inventory ---", 'item-text');
            this.print(p.inventory.join(', ') || "Empty");
            this.print("--- Equipment ---", 'item-text');
            Object.entries(p.equipment).forEach(([slot, item]) => this.print(`${slot}: ${item}`));
        },
        take: (item) => {
            const r = GameData.rooms[this.state.player.location];
            if (r.items?.includes(item)) {
                r.items = r.items.filter(i => i !== item);
                this.state.player.inventory.push(item);
                this.print(`Taken ${item}.`);
            } else this.print("Not here.");
        },
        save: () => {
            const code = btoa(JSON.stringify({p: this.state.player, w: this.state.world}));
            this.print("SAVE CODE:", 'save-text');
            this.print(code, 'save-text');
        },
        load: () => {
            this.print("PASTE CODE:", 'save-text');
            this.inputMode = 'load';
        },
        magic: () => {
            this.print("Known Spells: " + (this.state.player.knownSpells?.join(', ') || "None"), 'item-text');
        },
        attack: () => {
            const r = GameData.rooms[this.state.player.location];
            if (!r.enemy) return this.print("Nothing here.");
            const e = GameData.enemies[r.enemy];
            if (!r.curHp) r.curHp = e.hp;

            const s = this.getStats();
            const pDmg = Math.max(1, s.atk - e.def);
            r.curHp -= pDmg;
            this.print(`You hit ${r.enemy} for ${pDmg}.`, 'combat-text');

            if (r.curHp <= 0) {
                this.print(`Victory! Gained ${e.xp} XP and ${e.gold[0]} Gold.`, 'xp-text');
                this.state.player.xp += e.xp;
                this.state.player.gold += e.gold[0];
                delete r.enemy; delete r.curHp;
            } else {
                const eDmg = Math.max(1, e.atk - s.def);
                this.state.player.hp -= eDmg;
                this.print(`${r.enemy} hits you for ${eDmg}.`, 'combat-text');
            }
        }
    };
}

// BOOTSTRAP
const game = new GameEngine();
const inputEl = document.getElementById('command-input');
inputEl.addEventListener('keydown', (e) => {
    if (e.key === 'Enter') {
        const val = inputEl.value;
        inputEl.value = '';
        if (val || game.inputMode !== 'command') game.execute(val);
    }
});

game.print("SYSTEM READY. LOAD OR START NEW GAME.", 'item-text');
game.commands.look();
</script>
