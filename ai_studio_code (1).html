/**
 * SECTION 2: THE MASTER ENGINE
 */
class Engine {
    constructor() {
        this.state = this.getInitialState();
        this.terminal = document.getElementById('terminal');
        this.inputMode = 'command';
        this.lastCmd = '';
    }

    getInitialState() {
        return {
            p: { name: "Hero", hp: 50, mp: 20, baseMaxHp: 50, baseMaxMp: 20, attack: 5, defense: 2, xp: 0, level: 1, nextLevelXp: 100, gold: 0, inventory: [], equipment: {}, location: 'field', knownSpells: ['fireball'], reputation: { dwarves: 0 }, companions: [] },
            w: { lichDefeatedOnce: false, pirateCoveUnlocked: false, moriaUnlocked: false }
        };
    }

    print(text, cls = '') {
        const line = document.createElement('div');
        line.className = `output-line ${cls}`;
        line.innerHTML = text;
        this.terminal.appendChild(line);
        this.terminal.scrollTop = this.terminal.scrollHeight;
    }

    getStats() {
        const p = this.state.p;
        let s = { atk: p.attack, def: p.defense, mHp: p.baseMaxHp, mMp: p.baseMaxMp };
        Object.values(p.equipment || {}).forEach(name => {
            const i = GameData.items[name];
            if (i) {
                s.atk += (i.attack || 0);
                s.def += (i.defense || 0);
                s.mHp += (i.maxHp || 0);
                s.mMp += (i.maxMp || 0);
            }
        });
        return s;
    }

    process(input) {
        if (this.inputMode === 'load') return this.load(input);
        
        const raw = input.toLowerCase().trim();
        const parts = raw.split(' ');
        const cmd = parts[0];
        const arg = parts.slice(1).join(' ');

        if (raw) this.print(`> ${input}`, 'user-command');

        const map = { n:'n', s:'s', e:'e', w:'w', u:'u', d:'d', north:'n', south:'s', east:'e', west:'w', up:'u', down:'d', in:'in', out:'out' };
        
        if (map[cmd]) this.move(map[cmd]);
        else if (this.commands[cmd]) this.commands[cmd](arg);
        else this.print("Unknown command. Type 'help'.");
    }

    move(dir) {
        const room = GameData.rooms[this.state.p.location];
        
        // Key/Flag Logic
        if (this.state.p.location === 'mine_entrance' && dir === 's' && !this.state.w.moriaUnlocked) {
            return this.print("The Gate of Moria is locked. (Requires Dwarven Key)");
        }

        const target = room?.exits[dir];
        if (target) {
            this.state.p.location = target;
            this.commands.look();
        } else this.print("Can't go that way.");
    }

    load(code) {
        try {
            const d = JSON.parse(atob(code));
            this.state.p = d.p || d.player;
            this.state.w = d.w || d.worldState || {};
            if (this.state.p.inventory) this.state.p.inventory = this.state.p.inventory.filter(i => i !== null);
            this.print("RESTORING DATA...", 'save-text');
            this.inputMode = 'command';
            this.commands.look();
        } catch(e) {
            this.print("LOAD ERROR.", 'combat-text');
            this.inputMode = 'command';
        }
    }

    commands = {
        help: () => this.print("n, s, e, w, look, take, use, equip, attack, stats, inv, magic, cast, save, load, list, buy, rep, pet dog"),
        
        look: () => {
            const p = this.state.p;
            const r = GameData.rooms[p.location];
            this.print(r.name, 'location-title');
            this.print(r.desc);
            if (r.items?.length) this.print("Items: " + r.items.join(', '), 'item-text');
            if (r.enemy) this.print(`Enemy: ${r.enemy} (HP: ${GameData.enemies[r.enemy].hp})`, 'combat-text');
            if (r.dog) this.print(`A ${GameData.dogs[r.dog].name} is here.`, 'dog-text');
        },

        stats: () => {
            const p = this.state.p;
            const s = this.getStats();
            this.print(`--- ${p.name} (Lvl ${p.level}) ---`, 'location-title');
            this.print(`HP: ${p.hp}/${s.mHp} | MP: ${p.mp}/${s.mMp} | Gold: ${p.gold}`, 'xp-text');
            this.print(`Atk: ${s.atk} | Def: ${s.def}`, 'combat-text');
        },

        inv: () => {
            const p = this.state.p;
            this.print("--- Inventory ---", 'item-text');
            this.print(p.inventory.join(', ') || "Empty");
            this.print("--- Equipment ---", 'save-text');
            Object.entries(p.equipment).forEach(([slot, item]) => this.print(`${slot}: ${item}`));
        },

        take: (item) => {
            const r = GameData.rooms[this.state.p.location];
            if (r.items?.includes(item)) {
                r.items = r.items.filter(i => i !== item);
                this.state.p.inventory.push(item);
                this.print(`Taken ${item}.`);
            } else this.print("Not here.");
        },

        equip: (item) => {
            if (!this.state.p.inventory.includes(item)) return this.print("Don't have it.");
            const i = GameData.items[item];
            if (!i.type || i.type === 'misc') return this.print("Can't equip that.");
            if (this.state.p.equipment[i.type]) this.state.p.inventory.push(this.state.p.equipment[i.type]);
            this.state.p.equipment[i.type] = item;
            this.state.p.inventory.splice(this.state.p.inventory.indexOf(item), 1);
            this.print(`Equipped ${item}.`);
        },

        use: (item) => {
            const p = this.state.p;
            if (!p.inventory.includes(item)) return this.print("Don't have it.");
            const data = GameData.items[item];
            
            if (data.type === 'potion') {
                const s = this.getStats();
                if (item.includes('health')) p.hp = Math.min(s.mHp, p.hp + data.heals);
                if (item.includes('mana')) p.mp = Math.min(s.mMp, p.mp + data.heals);
                p.inventory.splice(p.inventory.indexOf(item), 1);
                this.print(`Used ${item}.`);
            } else if (item === 'dog treat') {
                const r = GameData.rooms[p.location];
                if (r.dog) {
                    p.companions.push(JSON.parse(JSON.stringify(GameData.dogs[r.dog])));
                    delete r.dog;
                    p.inventory.splice(p.inventory.indexOf(item), 1);
                    this.print("The dog is now your friend!", 'dog-text');
                } else this.print("No dog here.");
            } else if (item === 'dwarven key' && p.location === 'mine_entrance') {
                this.state.w.moriaUnlocked = true;
                this.print("You unlock the Gate of Moria!");
            }
        },

        attack: () => {
            const r = GameData.rooms[this.state.p.location];
            if (!r.enemy) return this.print("Nothing to attack.");
            const e = GameData.enemies[r.enemy];
            const s = this.getStats();

            if (!r.curHp) r.curHp = e.hp;

            // Player Turn
            const dmg = Math.max(1, s.atk - e.def);
            r.curHp -= dmg;
            this.print(`You hit ${r.enemy} for ${dmg}. [${Math.max(0, r.curHp)} HP left]`, 'combat-text');

            // Companion Turn
            this.state.p.companions.forEach(dog => {
                if (Math.random() < 0.4) {
                    const dDmg = Math.floor(dog.atk + Math.random() * 5);
                    r.curHp -= dDmg;
                    this.print(`${dog.name} bites for ${dDmg}!`, 'dog-text');
                }
            });

            if (r.curHp <= 0) {
                this.print(`VICTORY! Gained ${e.xp} XP and ${e.gold[0]} gold.`, 'xp-text');
                this.state.p.xp += e.xp;
                this.state.p.gold += e.gold[0];
                if (e.flag) this.state.w[e.flag] = true;
                delete r.enemy; delete r.curHp;
            } else {
                const eDmg = Math.max(1, e.atk - s.def);
                this.state.p.hp -= eDmg;
                this.print(`${r.enemy} hits you for ${eDmg}.`, 'combat-text');
                if (this.state.p.hp <= 0) this.print("YOU DIED.", 'combat-text');
            }
        },

        magic: () => this.print("Spells: " + this.state.p.knownSpells.join(', '), 'item-text'),

        cast: (spell) => {
            const p = this.state.p;
            if (!p.knownSpells.includes(spell)) return this.print("Don't know it.");
            const s = GameData.spells[spell];
            if (p.mp < s.mana) return this.print("Not enough mana.");
            
            p.mp -= s.mana;
            if (s.type === 'heal') {
                const sStats = this.getStats();
                p.hp = Math.min(sStats.mHp, p.hp + Math.floor(sStats.mHp * s.ratio));
                this.print(`Cast ${spell}. Healed.`, 'xp-text');
            } else {
                const r = GameData.rooms[p.location];
                if (!r.enemy) return this.print("No target.");
                const dmg = Math.floor(s.dmg[0] + Math.random() * (s.dmg[1]-s.dmg[0]));
                if (!r.curHp) r.curHp = GameData.enemies[r.enemy].hp;
                r.curHp -= dmg;
                this.print(`Cast ${spell} for ${dmg} damage!`, 'combat-text');
            }
        },

        list: () => {
            const shop = GameData.shops[this.state.p.location];
            if (!shop) return this.print("No shop here.");
            this.print("--- For Sale ---", 'gold-text');
            Object.entries(shop).forEach(([name, price]) => this.print(`${name}: ${price} gold`));
        },

        buy: (item) => {
            const shop = GameData.shops[this.state.p.location];
            if (!shop || !shop[item]) return this.print("Not for sale.");
            if (this.state.p.gold < shop[item]) return this.print("Not enough gold.");
            this.state.p.gold -= shop[item];
            this.state.p.inventory.push(item);
            this.print(`Bought ${item}.`, 'gold-text');
        },

        save: () => {
            const code = btoa(JSON.stringify(this.state));
            this.print("SAVE CODE:", 'save-text');
            this.print(code, 'save-text');
        },

        load: () => {
            this.print("PASTE CODE:");
            this.inputMode = 'load';
        },

        pet: (target) => {
            if (this.state.p.companions.length > 0) {
                this.print("You pet your dog. He wags his tail!", 'dog-text');
            } else this.print("No dog to pet.");
        }
    };
}

// BOOT
const game = new Engine();
const inputEl = document.getElementById('command-input');
inputEl.addEventListener('keydown', (e) => {
    if (e.key === 'Enter') {
        const val = inputEl.value;
        inputEl.value = '';
        if (val || game.inputMode === 'load') game.process(val);
    }
});

game.print("REYNOLDSLND SYSTEM INITIALIZED.", 'item-text');
game.commands.look();
</script>
